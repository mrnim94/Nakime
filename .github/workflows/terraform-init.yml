name: Terraform Init - Force Download

on:
  schedule:
    # GitHub scheduled workflows are best-effort and often delayed/dropped at busy :00/:30 marks.
    # Run twice per hour at off-peak minutes to approximate every 30 minutes more reliably.
    - cron: '7,37 * * * *'
  workflow_dispatch:  # Cho phép chạy manual
  push:
    branches: [ main, master ]
    paths:
      - '**.tf'

jobs:
  terraform-init:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Clean old modules (force fresh download)
        run: |
          echo "🗑️ Cleaning old modules to force fresh download from registry..."
          rm -rf .terraform
          echo "✅ Ready for fresh download"

      - name: Terraform Get Modules
        run: |
          echo "📦 Downloading modules from registry..."
          # Download modules
          terraform get || echo "⚠️ Validation errors ignored - modules downloaded successfully"
          echo "✅ Module download completed"
        env:
          TF_LOG: INFO

      - name: List downloaded modules
        run: |
          echo "=== Downloaded Terraform Modules ==="
          if [ -d ".terraform/modules" ]; then
            ls -1 .terraform/modules/
            du -sh .terraform/modules
          fi

      - name: Summary
        run: |
          echo "✅ Terraform get completed successfully"
          echo "📦 Fresh modules downloaded from aws-terraform-module and azure-terraform-module namespaces"
          echo "🔄 Next run in 30 minutes"
          terraform version
